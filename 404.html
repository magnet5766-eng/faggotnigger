<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting | Fortis</title>
    <script>
        const path = window.location.pathname.replace(/\/$/, "");
        const segments = path.split('/');
        const lastSegment = segments[segments.length - 1];
        const validPages = ['downloads', 'docs', 'about'];
        if (validPages.includes(lastSegment)) {
            window.location.replace('/' + lastSegment + '.html');
        } else if (lastSegment.includes('.html')) {
            window.location.replace('/');
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo"><a href="index.html">Fortis</a></div>
        </nav>
        <header class="page-header fade-up">
            <h1>Not Found</h1>
            <p style="color: rgba(255, 255, 255, 0.5);">The requested path does not exist.</p>
        </header>
        <a href="index.html" class="btn btn-primary fade-up">Return Home</a>
    </div>
    <script src="script.js"></script>
</body>
</html>
