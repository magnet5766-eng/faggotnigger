<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neuro Noise</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">

  <!-- Discord / Open Graph embed -->
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="Neuro Noise Studios">
  <meta property="og:title"       content="Neuro Noise">
  <meta property="og:description" content="The official home of every Neuro Noise Studios diss track.">
  <meta property="og:image"       content="icon.png">
  <meta name="theme-color"        content="#151912">

  <!-- Twitter card fallback -->
  <meta name="twitter:card"        content="summary">
  <meta name="twitter:title"       content="Neuro Noise">
  <meta name="twitter:description" content="The official home of every Neuro Noise Studios diss track.">
  <meta name="twitter:image"       content="icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Click-to-start overlay (required by browsers to allow autoplay) -->
  <div class="start-overlay" id="startOverlay">
    <button class="start-btn" id="startBtn" aria-label="Start">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 4.5L20 12L6 19.5V4.5Z" fill="currentColor" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
      </svg>
    </button>
    <p class="start-label">Click to play</p>
  </div>

  <!-- Audio -->
  <audio id="bgMusic" src="music.mp3" loop preload="auto"></audio>

  <!-- Music Controls -->
  <div class="music-controls" id="musicControls">
    <!-- Play/Pause Button -->
    <button class="ctrl-btn paused" id="playPauseBtn" aria-label="Play music" title="Play music">
      <!-- Pause icon (default since music plays on load) -->
      <svg class="icon icon-pause" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="4" width="4" height="16" rx="1.5" fill="currentColor"/>
        <rect x="15" y="4" width="4" height="16" rx="1.5" fill="currentColor"/>
      </svg>
      <!-- Play icon -->
      <svg class="icon icon-play" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 4.5L20 12L6 19.5V4.5Z" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </button>

    <!-- Volume Control -->
    <div class="ctrl-divider"></div>
    <div class="volume-wrap" id="volumeWrap">
      <button class="ctrl-btn" id="muteBtn" aria-label="Mute" title="Mute">
        <!-- Volume High -->
        <svg class="icon icon-vol-high" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 9.5V14.5H7L13 19V5L7 9.5H3Z" fill="currentColor" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
          <path d="M16.5 7.5C17.9 8.9 18.8 10.4 18.8 12C18.8 13.6 17.9 15.1 16.5 16.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M19.5 5C21.8 7.3 23 9.6 23 12C23 14.4 21.8 16.7 19.5 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <!-- Volume Low -->
        <svg class="icon icon-vol-low" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 9.5V14.5H7L13 19V5L7 9.5H3Z" fill="currentColor" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
          <path d="M16.5 8.5C17.6 9.6 18.3 10.7 18.3 12C18.3 13.3 17.6 14.4 16.5 15.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <!-- Muted -->
        <svg class="icon icon-vol-mute" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 9.5V14.5H7L13 19V5L7 9.5H3Z" fill="currentColor" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
          <path d="M17 9L22 15M22 9L17 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Volume Slider Track -->
      <div class="vol-slider-wrap" id="volSliderWrap">
        <div class="vol-track">
          <div class="vol-fill" id="volFill"></div>
        </div>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="100" aria-label="Volume">
      </div>
    </div>
  </div>

  <canvas id="neuro"></canvas>

  <div class="content">
    <div class="section section--hero">
      <div class="hero-text">
        <h1 class="title">Xander Diss Track</h1>
        <p class="subtitle">Official Xander Diss Track Music Video.</p>
      </div>
    </div>
  </div>

  <script id="vertShader" type="x-shader/x-vertex">
    precision mediump float;
    varying vec2 vUv;
    attribute vec2 a_position;

    void main() {
      vUv = .5 * (a_position + 1.);
      gl_Position = vec4(a_position, 0.0, 1.0);
    }
  </script>

  <script id="fragShader" type="x-shader/x-fragment">
    precision mediump float;
    varying vec2 vUv;
    uniform float u_time;
    uniform float u_ratio;
    uniform vec2 u_pointer_position;
    uniform float u_scroll_progress;

    vec2 rotate(vec2 uv, float th) {
      return mat2(cos(th), sin(th), -sin(th), cos(th)) * uv;
    }

    float neuro_shape(vec2 uv, float t, float p) {
      vec2 sine_acc = vec2(0.);
      vec2 res = vec2(0.);
      float scale = 8.;

      for (int j = 0; j < 15; j++) {
        uv = rotate(uv, 1.);
        sine_acc = rotate(sine_acc, 1.);
        vec2 layer = uv * scale + float(j) + sine_acc - t;
        sine_acc += sin(layer);
        res += (.5 + .5 * cos(layer)) / scale;
        scale *= (1.2 - .07 * p);
      }
      return res.x + res.y;
    }

    void main() {
      vec2 uv = .5 * vUv;
      uv.x *= u_ratio;

      vec2 pointer = vUv - u_pointer_position;
      pointer.x *= u_ratio;
      float p = clamp(length(pointer), 0., 1.);
      p = .5 * pow(1. - p, 2.);

      float t = .001 * u_time;
      vec3 color = vec3(0.);

      float noise = neuro_shape(uv, t, p);
      noise = 1.2 * pow(noise, 3.);
      noise += pow(noise, 10.);
      noise = max(.0, noise - .5);
      noise *= (1. - length(vUv - .5));

      color = normalize(vec3(.2, .5 + .4 * cos(3. * u_scroll_progress), .5 + .5 * sin(3. * u_scroll_progress)));
      color = color * noise;

      gl_FragColor = vec4(color, noise);
    }
  </script>

  <script src="audio.js"></script>
  <script src="script.js"></script>
</body>
</html>
